name: Maestro Cloud — Mobile UI Tests

# Aura Stories APK build + Maestro Cloud test pipeline
# Her push ve PR'da çalışır. Manuel tetikleme de mümkün.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manuel tetikleme — GitHub Actions UI üzerinden çalıştırılabilir

jobs:
  build-and-test:
    name: Build APK & Run Maestro Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Kaynak kodu çek ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js kurulumu ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java 17 kurulumu (Android build için) ────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK kurulumu ─────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      # ── 5. NPM bağımlılıklarını yükle ──────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Next.js static export build ──────────────────────
      - name: Build Next.js static export
        run: npm run build
        env:
          NODE_ENV: production
          # Firebase config env değişkenleri — CI ortamında dummy değerler
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'ci-dummy' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'ci-dummy' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'ci-dummy' }}

      # ── 7. Capacitor Android projesi oluştur/senkronize et ──
      - name: Sync Capacitor Android project
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      # ── 8. Debug APK build ──────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      # ── 9. APK'nın oluştuğunu doğrula ────────────────────
      - name: Verify APK artifact
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✓ APK build başarılı — $APK_PATH"
            echo "APK_SIZE=$(du -h "$APK_PATH" | cut -f1)" >> $GITHUB_ENV
          else
            echo "✗ APK bulunamadı — $APK_PATH"
            exit 1
          fi

      # ── 10. Maestro Cloud test ─────────────────────────────
      - name: Run Maestro Cloud tests
        uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: android/app/build/outputs/apk/debug/app-debug.apk
          workspace: .maestro
          # İsteğe bağlı: timeout, device seçimi vb.
          timeout: 600
          # Android cihazda test et
          platform: android

      # ── 11. APK'yı artifact olarak sakla (opsiyonel) ──────
      - name: Upload APK as CI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-stories-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
