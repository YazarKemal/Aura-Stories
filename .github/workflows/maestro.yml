name: Maestro Cloud — Mobile UI Tests

# Aura Stories APK build + Maestro Cloud paralel test pipeline
# Her flow ayrı job, biri kırılsa diğerleri çalışmaya devam eder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD — APK üret (tek sefer, tüm test job'ları paylaşır)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export → out/)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'ci-dummy' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'ci-dummy' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'ci-dummy' }}

      - name: Verify build output
        run: |
          ls -la out/ | head -20
          [ -f out/index.html ] || { echo "✗ out/index.html bulunamadı"; exit 1; }
          echo "✓ Static export başarılı"

      - name: Sync Capacitor Android project
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          [ -f "$APK_PATH" ] || { echo "✗ APK bulunamadı"; exit 1; }
          echo "✓ APK build başarılı — $(du -h "$APK_PATH" | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # TEST — 9 flow, paralel matrix job
  # ═══════════════════════════════════════════════════════════════
  test:
    name: "${{ matrix.flow }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        flow:
          - onboarding
          - main-navigation
          - reading
          - sharing
          - exit
          - auth
          - rewards-ads
          - vip-purchase
          - character-chat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk

      - name: Prepare flow workspace
        run: |
          # Tam .maestro/ yapısını koru (runFlow bağımlılıkları için)
          # flow.yaml olarak sadece hedef flow'u kopyala
          cp .maestro/flows/${{ matrix.flow }}.yaml .maestro/flow.yaml

      - name: Run Maestro Cloud — ${{ matrix.flow }}
        uses: mobile-dev-inc/action-maestro-cloud@v3.0.1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: app-debug.apk
          workspace: .maestro
          timeout: 600
          name: ${{ matrix.flow }}
          device-locale: tr_TR
