# Maestro Flow — Aura Stories UI Test Senaryosu
# Maestro Cloud CI ile çalışır. Lokalde: maestro test .maestro/flow.yaml

appId: com.prompthavenstudio.aurastories
---
# 1. Uygulamayı başlat
- launchApp

# 2. Splash Screen'in geçmesini bekle (2.8s animasyon + buffer)
- waitForAnimationToEnd:
    timeout: 5000

# 3. Onboarding — Step 1: Cinsiyet seç
- tapOn:
    text: "Kadın"
    optional: true

# 4. İlgi alanı seç (en az 1 tane gerekli)
- tapOn:
    text: "Fantastik"
    optional: true

# 5. Doğum yılı gir (zorunlu alan — label: "Doğum Yılın", placeholder: YYYY)
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"

# 6. "Devam" butonunu bulana kadar scroll yap ve tıkla
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"

# 7. Onboarding — Step 2: Dil ve mikro konu (varsayılanlarla devam)
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"

# 8. Yaş Doğrulama / EULA Modalı
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"

# 9. Ana ekran — Keşfet sekmesi görünür olmalı
- assertVisible: "Keşfet"

# 10. Keşfet ekranında scroll yap
- scroll

# 11. Kitaplık sekmesine geç
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"

# 12. Ödüller sekmesine geç
- tapOn: "Ödüller"
- assertVisible: "Ödüller"

# 13. Ben sekmesine geç
- tapOn: "Ben"
- assertVisible: "Ben"

# 14. Keşfet'e geri dön
- tapOn: "Keşfet"

# 15. Keşfet'te "Gece Yarısı Güneşi" hikaye kartına tıkla
- tapOn: "Gece Yarısı Güneşi"

# 16. Detay sayfası animasyonunun bitmesini bekle (slide-in 500ms)
- waitForAnimationToEnd:
    timeout: 1000

# 17. Hikaye detay sayfası — "Okumaya Başla" butonu (fixed bottom bar)
- assertVisible: "Okumaya Başla"

# ═══════════════════════════════════════════════════════════════
# HİKAYE OKUMA TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 18. Okumaya başla ──────────────────────────────────────
- tapOn: "Okumaya Başla"

# 19. Okuma ekranının yüklenmesini bekle
- waitForAnimationToEnd:
    timeout: 3000

# ── 20. Sayfa Çevirme Testi: Sola swipe (sonraki sayfa) ────
- swipe:
    direction: LEFT

# 21. Sağa swipe — geri sayfaya dön
- swipe:
    direction: RIGHT

# ── 22. Menü Kontrolü: Ekran ortasına tıkla → header açılır ─
- tapOn:
    point: "50%,50%"

# 23. Header'daki "Bölüm 1" yazısı görünür olmalı
- assertVisible: "Bölüm 1"

# ── 24. Tipografi Paneli: T ikonuna tıkla (header sağ üst) ──
- tapOn:
    point: "92%,5%"

# 25. Panel animasyonunun bitmesini bekle (slide-in 500ms)
- waitForAnimationToEnd:
    timeout: 2000

# 26. Tipografi paneli açıldı — font seçenekleri görünür olmalı
- assertVisible: "Bitter"

# 27. Yazı tipini değiştir — "Bitter" fontuna geç
- tapOn: "Bitter"

# 28. Satır aralığını "Geniş" yap
- tapOn: "Geniş"

# 29. Tipografi panelini kapat (panel dışına tıkla)
- tapOn:
    point: "50%,80%"

# ── 30. Header'ı kapat (ekran ortasına tıkla) ──────────────
- tapOn:
    point: "50%,50%"

# ── 31. Header'ı tekrar aç ve geri dön ──────────────────────
- tapOn:
    point: "50%,50%"
- assertVisible: "Bölüm 1"

# 32. Geri tuşu — sol üst köşe ArrowLeft
- tapOn:
    point: "5%,5%"
