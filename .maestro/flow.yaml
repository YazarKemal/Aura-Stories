# Maestro Flow — Aura Stories UI Test Senaryosu
# Maestro Cloud CI ile çalışır. Lokalde: maestro test .maestro/flow.yaml

appId: com.prompthavenstudio.aurastories
---
# 1. Uygulamayı başlat
- launchApp

# 2. Splash Screen'in geçmesini bekle (2.8s animasyon + buffer)
- waitForAnimationToEnd:
    timeout: 5000

# 3. Onboarding — Step 1: Cinsiyet seç
- tapOn:
    text: "Kadın"
    optional: true

# 4. İlgi alanı seç (en az 1 tane gerekli)
- tapOn:
    text: "Fantastik"
    optional: true

# 5. Doğum yılı gir (zorunlu alan — label: "Doğum Yılın", placeholder: YYYY)
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"

# 6. "Devam" butonunu bulana kadar scroll yap ve tıkla
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"

# 7. Onboarding — Step 2: Dil ve mikro konu (varsayılanlarla devam)
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"

# 8. Yaş Doğrulama / EULA Modalı
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"

# 9. Ana ekran — Keşfet sekmesi görünür olmalı
- assertVisible: "Keşfet"

# 10. Keşfet ekranında scroll yap
- scroll

# 11. Kitaplık sekmesine geç
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"

# 12. Ödüller sekmesine geç
- tapOn: "Ödüller"
- assertVisible: "Ödüller"

# 13. Ben sekmesine geç
- tapOn: "Ben"
- assertVisible: "Ben"

# 14. Keşfet'e geri dön
- tapOn: "Keşfet"

# 15. Keşfet'te "Gece Yarısı Güneşi" hikaye kartına tıkla
- tapOn: "Gece Yarısı Güneşi"

# 16. Detay sayfası animasyonunun bitmesini bekle (slide-in 500ms)
- waitForAnimationToEnd:
    timeout: 1000

# 17. Hikaye detay sayfası — "Okumaya Başla" butonu (fixed bottom bar)
- assertVisible: "Okumaya Başla"

# ═══════════════════════════════════════════════════════════════
# BOOKMARK & KİTAPLIK TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 18. Bookmark ekle (aria-label: Yer imi ekle) ─────────────
- tapOn: "Yer imi ekle"

# 19. Toast mesajı — "Yer İmi Eklendi!" görünmeli
- assertVisible: "Yer İmi Eklendi!"

# 20. Detaydan Keşfet'e dön
- tapOn:
    point: "8%,5%"

# 21. Kitaplık sekmesine geç
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"

# 22. Bookmark'lı hikaye kitaplıkta görünmeli
- assertVisible: "Gece Yarısı Güneşi"

# 23. Kitaplıktan hikayeyi tekrar aç
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 1000

# 24. Bookmark'ı kaldır (aria-label: Yer imi kaldır)
- tapOn: "Yer imi kaldır"

# 25. Toast — "Yer İmi Kaldırıldı" görünmeli
- assertVisible: "Yer İmi Kaldırıldı"

# 26. Detaydan Keşfet'e dön
- tapOn:
    point: "8%,5%"

# 27. Keşfet'ten hikayeye tekrar gir (okuma testine hazırlık)
- tapOn: "Keşfet"
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 1000

# ═══════════════════════════════════════════════════════════════
# HİKAYE OKUMA TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 28. Okumaya başla ──────────────────────────────────────
- tapOn: "Okumaya Başla"

# 29. Okuma ekranının yüklenmesini bekle
- waitForAnimationToEnd:
    timeout: 3000

# ═══════════════════════════════════════════════════════════════
# PAYLAŞMA TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 30. Paragrafa tek tık → selectedQuote → toolbar'da "Paylaş" ─
- tapOn:
    point: "50%,40%"

# 31. Toolbar animasyonu için kısa bekleme
- waitForAnimationToEnd:
    timeout: 1000

# ── 32. Toolbar'daki "Paylaş" butonuna tıkla ───────────────────
- tapOn: "Paylaş"

# 33. Paylaşım panelinin animasyonunu bekle
- waitForAnimationToEnd:
    timeout: 2000

# 34. Paylaşım paneli açıldı — "Instagram Hikayesi Oluştur" başlığı
- assertVisible: "Instagram Hikayesi Oluştur"

# 35. Paneli kapat — "Vazgeç" butonu
- tapOn: "Vazgeç"

# ═══════════════════════════════════════════════════════════════
# SAYFA ÇEVİRME TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 36. Sola swipe (sonraki sayfa) ──────────────────────────
- swipe:
    direction: LEFT

# 37. Sağa swipe — geri sayfaya dön
- swipe:
    direction: RIGHT

# ═══════════════════════════════════════════════════════════════
# MENÜ & TİPOGRAFİ TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 38. Ekran ortasına tıkla → header açılır ────────────────
- tapOn:
    point: "50%,50%"

# 39. Header'daki "Bölüm 1" yazısı görünür olmalı
- assertVisible: "Bölüm 1"

# ── 40. "Yazı tipi ayarları" butonuna tıkla (aria-label) ─────
- tapOn: "Yazı tipi ayarları"

# 41. Panel animasyonunun bitmesini bekle (slide-in 500ms)
- waitForAnimationToEnd:
    timeout: 2000

# 42. Satır aralığını "Geniş" yap (panel üst kısmında)
- tapOn: "Geniş"

# 43. Okuma temasını "karanlık" yap (aria-label: Tema karanlık)
- tapOn: "Tema karanlık"

# 44. Tipografi panelini kapat (overlay'e tıkla — panel üstü)
- tapOn:
    point: "50%,2%"

# ── 45. Header'ı kapat (ekran ortasına tıkla) ────────────────
- tapOn:
    point: "50%,50%"

# ── 46. Header'ı tekrar aç ve geri dön ──────────────────────
- tapOn:
    point: "50%,50%"

# 47. Geri dön (aria-label: Geri dön)
- tapOn: "Geri dön"
