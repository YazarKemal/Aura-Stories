# Maestro Flow — Aura Stories UI Test Senaryosu
# Maestro Cloud CI ile çalışır. Lokalde: maestro test .maestro/flow.yaml

appId: com.prompthavenstudio.aurastories
---
# 1. Uygulamayı başlat
- launchApp

# 2. Splash Screen'in geçmesini bekle (2.8s animasyon + buffer)
- waitForAnimationToEnd:
    timeout: 5000

# 3. Onboarding — Step 1: Cinsiyet seç
- tapOn:
    text: "Kadın"
    optional: true

# 4. İlgi alanı seç (en az 1 tane gerekli)
- tapOn:
    text: "Fantastik"
    optional: true

# 5. Doğum yılı gir (zorunlu alan — label: "Doğum Yılın", placeholder: YYYY)
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"

# 6. "Devam" butonunu bulana kadar scroll yap ve tıkla
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"

# 7. Onboarding — Step 2: Dil ve mikro konu (varsayılanlarla devam)
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"

# 8. Yaş Doğrulama / EULA Modalı
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"

# 9. Ana ekran — Keşfet sekmesi görünür olmalı
- assertVisible: "Keşfet"

# 10. Keşfet ekranında scroll yap
- scroll

# 11. Kitaplık sekmesine geç
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"

# 12. Ödüller sekmesine geç
- tapOn: "Ödüller"
- assertVisible: "Ödüller"

# 13. Ben sekmesine geç
- tapOn: "Ben"
- assertVisible: "Ben"

# 14. Keşfet'e geri dön
- tapOn: "Keşfet"

# 15. Keşfet'te "Gece Yarısı Güneşi" hikaye kartına tıkla
- tapOn: "Gece Yarısı Güneşi"

# 16. Detay sayfası animasyonunun bitmesini bekle (slide-in 500ms)
- waitForAnimationToEnd:
    timeout: 1000

# 17. Hikaye detay sayfası — "Okumaya Başla" butonu (fixed bottom bar)
- assertVisible: "Okumaya Başla"

# ═══════════════════════════════════════════════════════════════
# HİKAYE OKUMA TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 18. Okumaya başla ──────────────────────────────────────
- tapOn: "Okumaya Başla"

# 19. Okuma ekranının yüklenmesini bekle
- waitForAnimationToEnd:
    timeout: 3000

# ═══════════════════════════════════════════════════════════════
# PAYLAŞMA TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 20. "Paylaş" butonuna tıkla (bölüm sonu footer) ──────────
- tapOn: "Paylaş"

# 21. Paylaşım panelinin animasyonunu bekle
- waitForAnimationToEnd:
    timeout: 2000

# 22. Paylaşım paneli açıldı — "Instagram Hikayesi Oluştur" başlığı
- assertVisible: "Instagram Hikayesi Oluştur"

# 23. Paneli kapat — "Vazgeç" butonu
- tapOn: "Vazgeç"

# ═══════════════════════════════════════════════════════════════
# SAYFA ÇEVİRME TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 24. Sola swipe (sonraki sayfa) ──────────────────────────
- swipe:
    direction: LEFT

# 25. Sağa swipe — geri sayfaya dön
- swipe:
    direction: RIGHT

# ═══════════════════════════════════════════════════════════════
# MENÜ & TİPOGRAFİ TESTİ
# ═══════════════════════════════════════════════════════════════

# ── 26. Ekran ortasına tıkla → header açılır ────────────────
- tapOn:
    point: "50%,50%"

# 27. Header'daki "Bölüm 1" yazısı görünür olmalı
- assertVisible: "Bölüm 1"

# ── 28. "Yazı tipi ayarları" butonuna tıkla (aria-label) ─────
- tapOn: "Yazı tipi ayarları"

# 29. Panel animasyonunun bitmesini bekle (slide-in 500ms)
- waitForAnimationToEnd:
    timeout: 2000

# 30. Satır aralığını "Geniş" yap (panel üst kısmında)
- tapOn: "Geniş"

# 31. Okuma temasını "karanlık" yap (aria-label: Tema karanlık)
- tapOn: "Tema karanlık"

# 32. Tipografi panelini kapat (overlay'e tıkla — panel üstü)
- tapOn:
    point: "50%,2%"

# ── 33. Header'ı kapat (ekran ortasına tıkla) ────────────────
- tapOn:
    point: "50%,50%"

# ── 34. Header'ı tekrar aç ve geri dön ──────────────────────
- tapOn:
    point: "50%,50%"

# 35. Geri dön (aria-label: Geri dön)
- tapOn: "Geri dön"
