# Maestro Flow — Aura Stories UI Test Senaryosu
# Maestro Cloud CI ile çalışır. Lokalde: maestro test .maestro/flow.yaml

appId: com.prompthavenstudio.aurastories
---
# 1. Uygulamayı başlat
- launchApp

# 2. Splash Screen'in geçmesini bekle (2.8s animasyon + buffer)
- waitForAnimationToEnd:
    timeout: 5000

# 3. Onboarding — Step 1: Cinsiyet seç
- tapOn:
    text: "Kadın"
    optional: true

# 4. İlgi alanı seç (en az 1 tane gerekli)
- tapOn:
    text: "Fantastik"
    optional: true

# 5. Doğum yılı gir (zorunlu alan — label: "Doğum Yılın", placeholder: YYYY)
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"

# 6. "Devam" butonunu bulana kadar scroll yap ve tıkla
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"

# 7. Onboarding — Step 2: Dil ve mikro konu (varsayılanlarla devam)
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"

# 8. Yaş Doğrulama / EULA Modalı
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"

# 9. Ana ekran — Keşfet sekmesi görünür olmalı
- assertVisible: "Keşfet"

# 10. Keşfet ekranında scroll yap
- scroll

# 11. Kitaplık sekmesine geç
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"

# 12. Ödüller sekmesine geç
- tapOn: "Ödüller"
- assertVisible: "Ödüller"

# 13. Ben sekmesine geç
- tapOn: "Ben"
- assertVisible: "Ben"

# 14. Keşfet'e geri dön
- tapOn: "Keşfet"

# 15. Bir hikaye kartına tıkla — detay sayfası açılmalı
- tapOn:
    index: 0
    optional: true

# 16. Okumaya başla butonu görünür olmalı (BookDetailView içinde)
- assertVisible:
    text: "Okumaya Başla"
    optional: true

# 17. Okumaya başla
- tapOn:
    text: "Okumaya Başla"
    optional: true

# 18. Okuma ekranında swipe (sayfa çevirme)
- swipe:
    direction: LEFT

# 19. Okuma ekranında geri swipe
- swipe:
    direction: RIGHT
