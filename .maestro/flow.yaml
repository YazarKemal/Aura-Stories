# Master Flow — tüm test modüllerini sırayla çalıştırır
# Kullanım: maestro test .maestro/flow.yaml
#
# Her flow bağımsız çalışır (kendi onboarding'ini yapar).
# Bu master flow tümünü tek seferde çalıştırır.
#
# Bağımsız modül testleri:
#   maestro test .maestro/flows/onboarding.yaml
#   maestro test .maestro/flows/main-navigation.yaml
#   maestro test .maestro/flows/reading.yaml
#   maestro test .maestro/flows/sharing.yaml
#   maestro test .maestro/flows/exit.yaml
#   maestro test .maestro/flows/auth.yaml
#   maestro test .maestro/flows/rewards-ads.yaml
#   maestro test .maestro/flows/vip-purchase.yaml
#   maestro test .maestro/flows/character-chat.yaml

appId: com.prompthavenstudio.aurastories
---
- runFlow: flows/onboarding.yaml
- runFlow: flows/main-navigation.yaml
- runFlow: flows/reading.yaml
- runFlow: flows/sharing.yaml
- runFlow: flows/exit.yaml
- runFlow: flows/auth.yaml
- runFlow: flows/rewards-ads.yaml
- runFlow: flows/vip-purchase.yaml
- runFlow: flows/character-chat.yaml
