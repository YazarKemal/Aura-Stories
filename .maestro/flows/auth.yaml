# Auth Flow — login/register modal testi
# Bağımsız çalışır: maestro test .maestro/flows/auth.yaml
#
# Selector'lar (auth-modal.tsx):
#   Tabs:    "Giriş" (login), "Kayıt" (register)
#   Inputs:  "E-posta" label, "Şifre" label, "Ad Soyad" label (register only)
#   Button:  "Giriş Yap" (login mode), "Kayıt Ol" (register mode)
#   Error:   inline error <p> with text-[10px] text-destructive

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn: "Kadın"
- tapOn: "Fantastik"
- tapOn: "YYYY"
- inputText: "1995"
# Klavyeyi BURADA kapat — onboarding'de dialog yok, güvenli.
# (Modal içinde hideKeyboard Radix dialog'u kapatıyor; açık kalan
# klavye ise modaldaki 'Giriş Yap' butonunu örtüyor)
- hideKeyboard
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ═══════════════════════════════════════════════════════════════
# AUTH MODAL'ı AÇ
# ═══════════════════════════════════════════════════════════════

# ── Ben sekmesine git ────────────────────────────────────────
- tapOn: "Ben"
- assertVisible: "Ben"

# ── Auth modal'ı aç — "Giriş yap" butonu (aria-label) ────────
- scrollUntilVisible:
    element:
      text: "Giriş yap"
    direction: DOWN
- tapOn: "Giriş yap"

# ── Modal animasyonu ─────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 1000

# ═══════════════════════════════════════════════════════════════
# LOGIN SEKESİ — hata mesajı testi
# ═══════════════════════════════════════════════════════════════

# ── "Giriş" sekmesinde olduğumuzu doğrula ────────────────────
- assertVisible: "Giriş"

# ── Boş form submit → hata mesajı ────────────────────────────
#     NOT: hideKeyboard KULLANMA — Radix dialog'u kapatıyor
#     (Cloud ekran görüntüsüyle doğrulandı)
- tapOn: "Giriş Yap"
- assertVisible: "Lütfen tüm alanları doldurun."

# ── Geçersiz e-posta dene ────────────────────────────────────
- tapOn: "E-posta"
- inputText: "gecersiz@mail.com"
- tapOn: "Şifre"
- inputText: "1234"
- tapOn: "Giriş Yap"

# ═══════════════════════════════════════════════════════════════
# REGISTER SEKESİ
# ═══════════════════════════════════════════════════════════════

# ── "Kayıt" sekmesine geç ────────────────────────────────────
- tapOn: "Kayıt"

# ── Kayıt formunda "Ad Soyad" alanı görünmeli ────────────────
- assertVisible: "Ad Soyad"

# ── Kayıt formunu doldur ─────────────────────────────────────
- tapOn: "Ad Soyad"
- inputText: "Test Kullanıcı"
- tapOn: "E-posta"
- inputText: "test@aura.app"
- tapOn: "Şifre"
- inputText: "1234"

# ── "Kayıt Ol" butonu görünmeli ──────────────────────────────
- assertVisible: "Kayıt Ol"

# ── Modal'ı kapat ────────────────────────────────────────────
- back
