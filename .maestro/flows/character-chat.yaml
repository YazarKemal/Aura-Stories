# Character Chat Flow — AI karakter sohbeti
# Bağımsız çalışır: maestro test .maestro/flows/character-chat.yaml
#
# Selector'lar (character-chat-view.tsx):
#   Chat giriş:  "Karakter Odası" (BookDetailView Card)
#   Input:       aria-label "Mesaj yaz"
#   Send:        aria-label "Mesaj gönder"
#   AI yanıtı:   extendedWaitUntil ile streaming yanıt beklenir

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn: "Kadın"
- tapOn: "Fantastik"
- tapOn: "YYYY"
- inputText: "1995"
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ── Hikaye detayına git — KİTAPLIK üzerinden ─────────────
#     Discover'daki carousel/AI-öneri layout kaymaları story tap'ını
#     4 koşudur deterministik düşürüyor; main-navigation'da iki
#     koşudur YEŞİL olan rota kullanılıyor: Kitaplık → statik liste
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"
- assertVisible: "Gece Yarısı Güneşi"
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Okumaya Başla"

# ═══════════════════════════════════════════════════════════════
# KARAKTER SOHBETİNE GİRİŞ
# ═══════════════════════════════════════════════════════════════

# ── Hikaye detayında "Karakter Odası" kartına tıkla ──────────
- scrollUntilVisible:
    element:
      text: "Karakter Odası"
    direction: DOWN
- tapOn: "Karakter Odası"

# ── CharacterRoom animasyonu ──────────────────────────────────
- waitForAnimationToEnd:
    timeout: 3000

# ── İlk karakteri seç ("Kerem" — Gece Yarısı Güneşi) ─────────
#     WebView, buton içeriğini tek düğüme düzleştirebilir
#     ("Kerem Gizemli kütüphaneci...") — regex "contains" ile eşle
- tapOn:
    text: ".*Kerem.*"

# ── Chat ekranı animasyonu ───────────────────────────────────
- waitForAnimationToEnd:
    timeout: 2000

# ── Chat başlığı görünmeli (header: "Kerem ile Sohbet") ──────
#     Tam metin "Kerem ile Sohbet" — kısmi eşleşme için regex şart
- assertVisible: ".*ile Sohbet.*"

# ═══════════════════════════════════════════════════════════════
# MESAJ GÖNDERME
# ═══════════════════════════════════════════════════════════════

# ── Input alanına tıkla ve mesaj yaz ─────────────────────────
#     WebView, input düğümünü aria-label yerine placeholder ile
#     gösterebilir — iki olasılığı da kapsayan regex
- tapOn:
    text: "(.*Mesaj yaz.*|.*bir şey yaz.*)"
# NOT: Android'de Maestro inputText yalnızca ASCII karakterleri
# güvenilir yazar — 'ı/ş' içeren metin bozuk girilip assert'i
# düşürüyordu, mesaj ASCII'ye çevrildi
- inputText: "Merhaba nasilsin"

# ── Mesajı gönder ────────────────────────────────────────────
- tapOn: "Mesaj gönder"

# ── AI yanıtını bekle (DeepSeek API ~5-15s) ──────────────────
#     Kullanıcı balonu anında görünür; asıl bekleme "yazıyor"
#     göstergesinin kaybolması (isLoading=false) — yanıt da
#     hata balonu da bu koşulu sağlar (CI'da deterministik)
#     NOT: metinler regex'tir — "?" quantifier'a dönüşmesin diye
#     nokta-yıldız contains kalıbı kullanılıyor
- assertVisible: ".*Merhaba nasilsin.*"
- extendedWaitUntil:
    notVisible:
      text: ".*yazıyor.*"
    timeout: 20000

# ═══════════════════════════════════════════════════════════════
# ÇIKIŞ
# ═══════════════════════════════════════════════════════════════

# ── Geri dön (sol üst ArrowLeft) ─────────────────────────────
#     KANIT (Cloud ekran görüntüsü): klavye hâlâ açık — point tap'ı
#     yutuyor/ıskalatıyor. Önce klavyeyi kapat (açıkken güvenli:
#     back-benzeri event'i IME tüketir), sonra koordinat yerine
#     aria-label ile tıkla (klavye kapanınca konum yeniden hesaplanır)
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
- tapOn: "Geri dön"

# ── Detay sayfasına dönüldü ──────────────────────────────────
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Okumaya Başla"
