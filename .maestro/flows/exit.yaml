# Exit Flow — okuma ekranından ana ekrana güvenli çıkış
# Bağımsız çalışır: maestro test .maestro/flows/exit.yaml

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn:
    text: "Kadın"
    optional: true
- tapOn:
    text: "Fantastik"
    optional: true
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ── Hikaye detayına git ──────────────────────────────────
- scroll
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible: "Okumaya Başla"

# ── Okumaya başla ────────────────────────────────────────────
- tapOn: "Okumaya Başla"
- waitForAnimationToEnd:
    timeout: 3000

# ── Header'ı aç ──────────────────────────────────────────────
- tapOn:
    point: "50%,50%"
- assertVisible: "Bölüm 1"

# ── Geri dön (aria-label) ────────────────────────────────────
- tapOn: "Geri dön"

# ── Ana ekrana dönüldüğünü doğrula ───────────────────────────
- assertVisible: "Keşfet"
