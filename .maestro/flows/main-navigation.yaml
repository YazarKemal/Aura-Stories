# Main Navigation Flow — ana ekran + hikaye detayı + bookmark/kitaplık
# Bağımsız çalışır: maestro test .maestro/flows/main-navigation.yaml

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn:
    text: "Kadın"
    optional: true
- tapOn:
    text: "Fantastik"
    optional: true
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ═══════════════════════════════════════════════════════════════
# ANA EKRAN & SEKMELER
# ═══════════════════════════════════════════════════════════════

# ── Keşfet ekranında scroll ─────────────────────────────────
- scroll

# ── Kitaplık sekmesi ─────────────────────────────────────────
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"

# ── Ödüller sekmesi ──────────────────────────────────────────
- tapOn: "Ödüller"
- assertVisible: "Ödüller"

# ── Ben sekmesi ──────────────────────────────────────────────
- tapOn: "Ben"
- assertVisible: "Ben"

# ── Keşfet'e geri dön ────────────────────────────────────────
- tapOn: "Keşfet"

# ═══════════════════════════════════════════════════════════════
# HİKAYE DETAYI
# ═══════════════════════════════════════════════════════════════

# ── Hikaye kartına tıkla ─────────────────────────────────────
- tapOn: "Gece Yarısı Güneşi"

# ── Detay animasyonu ─────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 1000

# ── Detay sayfası doğrulama ──────────────────────────────────
- assertVisible: "Okumaya Başla"

# ═══════════════════════════════════════════════════════════════
# BOOKMARK & KİTAPLIK
# ═══════════════════════════════════════════════════════════════

# ── Bookmark ekle ────────────────────────────────────────────
- tapOn: "Yer imi ekle"

# ── Detaydan çık ─────────────────────────────────────────────
- back
- waitForAnimationToEnd:
    timeout: 1000

# ── Kitaplıkta doğrula ───────────────────────────────────────
- tapOn: "Kitaplık"
- assertVisible: "Kitaplık"
- assertVisible: "Gece Yarısı Güneşi"

# ── Kitaplıktan aç ───────────────────────────────────────────
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 1000

# ── Bookmark'ı kaldır ────────────────────────────────────────
- tapOn: "Yer imi kaldır"

# ── Detaydan çık ─────────────────────────────────────────────
- back
- waitForAnimationToEnd:
    timeout: 1000

# ── Keşfet'e dön, hikayeye tekrar gir (sonraki test için hazır)
- tapOn: "Keşfet"
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 1000
