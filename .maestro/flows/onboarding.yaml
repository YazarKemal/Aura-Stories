# Onboarding Flow — ilk açılış + kullanıcı tercihleri
# Bağımsız çalışır: maestro test .maestro/flows/onboarding.yaml

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── 1. Cinsiyet seç ─────────────────────────────────────────
- tapOn: "Kadın"

# ── 2. İlgi alanı seç ───────────────────────────────────────
- tapOn: "Fantastik"

# ── 3. Doğum yılı gir ───────────────────────────────────────
- tapOn: "YYYY"
- inputText: "1995"

# ── 4. Step 1 → Step 2 ──────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"

# ── 5. Step 2 → tamamla ─────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"

# ── 6. Yaş Doğrulama / EULA ─────────────────────────────────
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"

# ── 7. Ana ekran doğrulama ──────────────────────────────────
- assertVisible: "Keşfet"
