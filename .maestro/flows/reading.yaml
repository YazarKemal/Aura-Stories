# Reading Flow — okuma (FlipBook) + sayfa çevirme + menü/tipografi + çıkış
# Bağımsız çalışır: maestro test .maestro/flows/reading.yaml

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn:
    text: "Kadın"
    optional: true
- tapOn:
    text: "Fantastik"
    optional: true
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ── Hikaye detayına git ──────────────────────────────────
- scroll
- tapOn: "Gece Yarısı Güneşi"
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible: "Okumaya Başla"

# ═══════════════════════════════════════════════════════════════
# OKUMA EKRANINA GİRİŞ
# ═══════════════════════════════════════════════════════════════

# ── Okumaya başla ────────────────────────────────────────────
- tapOn: "Okumaya Başla"

# ── FlipBook 3D yükleme ──────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 3000

# ═══════════════════════════════════════════════════════════════
# SAYFA ÇEVİRME
# ═══════════════════════════════════════════════════════════════

# ── Sola swipe (sonraki sayfa) ───────────────────────────────
- swipe:
    direction: LEFT

# ── Sağa swipe (önceki sayfa) ────────────────────────────────
- swipe:
    direction: RIGHT

# ═══════════════════════════════════════════════════════════════
# MENÜ & TİPOGRAFİ
# ═══════════════════════════════════════════════════════════════

# ── Center-tap → header aç ───────────────────────────────────
- tapOn:
    point: "50%,50%"

# ── Header doğrulama ─────────────────────────────────────────
- assertVisible: "Bölüm 1"

# ── Tipografi panelini aç (aria-label) ───────────────────────
- tapOn: "Yazı tipi ayarları"

# ── Panel animasyonu ─────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 2000

# ── Satır aralığı değiştir ───────────────────────────────────
- tapOn: "Geniş"

# ── Tema değiştir (aria-label) ───────────────────────────────
- tapOn: "Tema karanlık"

# ── Paneli kapat ─────────────────────────────────────────────
- tapOn:
    point: "50%,2%"

# ── Header'ı kapat ───────────────────────────────────────────
- tapOn:
    point: "50%,50%"

# ═══════════════════════════════════════════════════════════════
# ÇIKIŞ
# ═══════════════════════════════════════════════════════════════

# ── Header'ı tekrar aç ───────────────────────────────────────
- tapOn:
    point: "50%,50%"

# ── Geri dön (aria-label) ────────────────────────────────────
- tapOn: "Geri dön"
