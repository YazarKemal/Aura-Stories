# Sharing Flow — paragrafa tıkla → Paylaş → Instagram paneli → kapat
# Bağımsız çalışır: maestro test .maestro/flows/sharing.yaml

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn:
    text: "Kadın"
    optional: true
- tapOn:
    text: "Fantastik"
    optional: true
- tapOn:
    text: "YYYY"
    optional: true
- inputText: "1995"
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ═══════════════════════════════════════════════════════════════
# OKUMA EKRANINA GİRİŞ
# ═══════════════════════════════════════════════════════════════

- tapOn: "Okumaya Başla"
- waitForAnimationToEnd:
    timeout: 3000

# ═══════════════════════════════════════════════════════════════
# PAYLAŞMA TESTİ
# ═══════════════════════════════════════════════════════════════

# ── Paragrafa tıkla → selectedQuote → "Paylaş" toolbar'ı ─────
- tapOn:
    point: "50%,40%"

# ── Toolbar animasyonu ───────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 1000

# ── "Paylaş" butonu ──────────────────────────────────────────
- tapOn: "Paylaş"

# ── Panel animasyonu ─────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 2000

# ── Instagram paneli doğrulama ───────────────────────────────
- assertVisible: "Instagram Hikayesi Oluştur"

# ── Paneli kapat ─────────────────────────────────────────────
- tapOn: "Vazgeç"
