# VIP Purchase Flow — VIP ekranı + kademe seçimi
# Bağımsız çalışır: maestro test .maestro/flows/vip-purchase.yaml
#
# Selector'lar (vip-screen.tsx):
#   "VIP AYRICALIKLARI" — perks başlığı
#   "REKLAM İZLEYEREK VIP KAZAN" — ad-watch section
#   Tier titles: "1 Günlük VIP", "7 Günlük VIP", "30 Günlük VIP"
#   "EN AVANTAJLI" badge (7 günlük tier'da)
#   Perks: "Reklamsız Deneyim", "Aylık 500 Hediye Jeton", etc.

appId: com.prompthavenstudio.aurastories
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# ── Onboarding (inline) ────────────────────────────────────
- tapOn: "Kadın"
- tapOn: "Fantastik"
- tapOn: "YYYY"
- inputText: "1995"
- scrollUntilVisible:
    element:
      text: "Devam"
    direction: DOWN
- tapOn: "Devam"
- scrollUntilVisible:
    element:
      text: "Okumaya Başlayın"
    direction: DOWN
- tapOn: "Okumaya Başlayın"
- assertVisible: "Hoş Geldiniz"
- tapOn:
    id: "age-check"
    optional: true
- tapOn: "Devam Et"
- assertVisible: "Keşfet"

# ═══════════════════════════════════════════════════════════════
# VIP EKRANINA GİRİŞ
# ═══════════════════════════════════════════════════════════════

# ── Ben sekmesine git ────────────────────────────────────────
- tapOn: "Ben"
- assertVisible: "Ben"

# ── VIP banner'ı bulana kadar scroll, sonra tıkla ────────────
#     Kart düğümü alt başlıkla düzleşiyor ("Aura VIP'ye Yükselt
#     Ayrıcalıklı okuma dünyası") — regex "contains" şart
- scrollUntilVisible:
    element:
      text: ".*Aura VIP.*"
    direction: DOWN
- tapOn:
    text: ".*Aura VIP.*"

# ── VIP ekranı animasyonu ────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 2000

# ═══════════════════════════════════════════════════════════════
# VIP EKRANI DOĞRULAMA
# ═══════════════════════════════════════════════════════════════

# ── VIP ayrıcalıkları başlığı ────────────────────────────────
- assertVisible: ".*Reklamsız Deneyim.*"

# ── Kademe seçenekleri görünmeli ─────────────────────────────
#     Kademe kartları fiyat/açıklamayla düzleşiyor — regex
- assertVisible: ".*1 Günlük VIP.*"
- assertVisible: ".*7 Günlük VIP.*"
- assertVisible: ".*30 Günlük VIP.*"

# ═══════════════════════════════════════════════════════════════
# KADEME SEÇİMİ
# ═══════════════════════════════════════════════════════════════

# ── "7 Günlük VIP" kademesini seç (varsayılan zaten seçili) ──
- tapOn:
    text: ".*7 Günlük VIP.*"

# ── Seçim doğrulama — "EN AVANTAJLI" badge'i ─────────────────
- assertVisible: ".*EN AVANTAJLI.*"

# ═══════════════════════════════════════════════════════════════
# ÇIKIŞ
# ═══════════════════════════════════════════════════════════════

# ── Geri dön ──────────────────────────────────────────────────
#     Donanım 'back' yerine header'daki X (Kapat) butonu
- tapOn: "Kapat"
- waitForAnimationToEnd:
    timeout: 2000

# ── Ana ekrana dönüldü ───────────────────────────────────────
- assertVisible: "Ben"
